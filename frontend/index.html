<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Manifest & Mobile Installation parameters -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EcoVision AI" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#10b981" />
    
    <title>EcoVision AI - Smart Waste Management</title>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script>
      (function() {
        const apiEnvVal = "%VITE_API_URL%";
        window.__API_URL__ = (apiEnvVal.startsWith('%') && apiEnvVal.endsWith('%')) ? '' : apiEnvVal;
        const originalFetch = window.fetch;
        window.fetch = function (input, init) {
          if (typeof input === 'string' && input.startsWith('/api/')) {
            input = window.__API_URL__ + input;
          }
          return originalFetch(input, init);
        };
      })();

      window.onerror = function(message, source, lineno, colno, error) {
        fetch('/api/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            source: source,
            lineno: lineno,
            colno: colno,
            stack: error ? error.stack : ''
          })
        });
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        fetch('/api/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: 'Unhandled Rejection: ' + event.reason,
            source: '',
            lineno: 0,
            colno: 0,
            stack: event.reason ? event.reason.stack : ''
          })
        });
      });
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-darker text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
